version: "2"
run:
  timeout: 10m
  build-tags:
    - rpctest
linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errorlint
    - godoclint
    - exhaustive
    - copyloopvar
    - fatcontext
    - goconst
    - godot
    - govet
    - grouper
    - ineffassign
    - makezero
    - mirror
    - misspell
    - nilerr
    - nilnil
    - nosprintfhostport
    - prealloc
    - predeclared
    - reassign
    - rowserrcheck
    - staticcheck
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
  settings:
    staticcheck:
      checks:
          - S1*
    godoclint:
      default: none
      enable:
        - pkg-doc
        - start-with-name
        - deprecated
        - no-unused-link
formatters:
  enable:
    - gofmt
    - goimports
